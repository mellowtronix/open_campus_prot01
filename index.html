<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>声の吹き出し — 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --paper:#f6f3ec;
    --ink:#141414;
    --accent:#e5533d;
    --muted:#8a8578;
    --led-off:#cfc9ba;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--paper);}
  body{
    font-family:"Zen Maru Gothic",system-ui,sans-serif;
    color:var(--ink);
    background-color:var(--paper);
    background-image:radial-gradient(rgba(20,20,20,0.05) 1px, transparent 1.4px);
    background-size:14px 14px;
    position:fixed;inset:0;
  }
  #scene{position:fixed;inset:0;z-index:1;}
  .vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 220px rgba(20,20,20,0.10);}

  /* 上部ステータス */
  #status{position:fixed;top:0;left:0;right:0;z-index:5;
    display:flex;justify-content:center;pointer-events:none;padding:16px 14px;}
  #status .pill{
    max-width:90vw;background:rgba(255,255,255,0.85);
    border:2px solid var(--ink);border-radius:999px;
    padding:8px 18px;font-size:15px;font-weight:700;
    display:flex;align-items:center;gap:10px;
    box-shadow:3px 3px 0 rgba(20,20,20,0.9);backdrop-filter:blur(2px);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #status .dot{width:10px;height:10px;border-radius:50%;background:var(--muted);flex:none;}
  #status.live .dot{background:var(--accent);animation:pulse 1s infinite;}
  @keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}100%{transform:scale(1);opacity:1}}

  /* 下部コントロール */
  #controls{position:fixed;left:0;right:0;bottom:0;z-index:6;
    display:flex;flex-direction:column;align-items:center;gap:12px;
    padding:18px 16px calc(22px + env(safe-area-inset-bottom));}

  /* LEDレベルメーター */
  #meter{
    display:flex;align-items:center;gap:10px;
    background:rgba(255,255,255,0.85);border:2px solid var(--ink);
    border-radius:12px;padding:8px 14px;
    box-shadow:3px 3px 0 rgba(20,20,20,0.9);backdrop-filter:blur(2px);}
  #meter .label{font-size:11px;font-weight:900;letter-spacing:.12em;color:var(--muted);}
  #leds{display:flex;gap:5px;align-items:center;}
  #leds .led{
    width:12px;height:20px;border-radius:3px;border:1.5px solid rgba(20,20,20,0.55);
    background:var(--led-off);transition:background .06s linear, box-shadow .06s linear;}
  #leds .led.on{background:#39c46b;box-shadow:0 0 7px rgba(57,196,107,0.85);}
  #leds .led.on.amber{background:#f2b134;box-shadow:0 0 7px rgba(242,177,52,0.9);}
  #leds .led.on.red{background:#e5533d;box-shadow:0 0 8px rgba(229,83,61,0.95);}
  #meter.idle .label{opacity:.5;}

  #mic{
    appearance:none;border:3px solid var(--ink);cursor:pointer;
    background:var(--accent);color:#fff;font-family:inherit;
    font-weight:900;font-size:18px;letter-spacing:.04em;
    padding:15px 30px;border-radius:16px;
    box-shadow:5px 5px 0 rgba(20,20,20,0.9);
    transition:transform .06s ease, box-shadow .06s ease;
    display:flex;align-items:center;gap:12px;}
  #mic:active{transform:translate(3px,3px);box-shadow:2px 2px 0 rgba(20,20,20,0.9);}
  #mic.on{background:#fff;color:var(--ink);}
  #mic .ico{font-size:20px;}
  #hint{font-size:12px;color:var(--muted);font-weight:500;text-align:center;max-width:88vw;}

  #fatal{position:fixed;inset:0;z-index:20;display:none;
    align-items:center;justify-content:center;padding:28px;
    background:rgba(246,243,236,0.96);text-align:center;}
  #fatal .box{max-width:440px;border:3px solid var(--ink);background:#fff;
    padding:26px 24px;border-radius:18px;box-shadow:6px 6px 0 rgba(20,20,20,0.9);}
  #fatal h2{font-size:20px;margin-bottom:10px;}
  #fatal p{font-size:14px;line-height:1.7;color:#333;}
</style>
</head>
<body>
  <div id="scene"></div>
  <div class="vignette"></div>

  <div id="status"><div class="pill"><span class="dot"></span><span id="statusText">マイクを押して話しかけてください</span></div></div>

  <div id="controls">
    <div id="meter" class="idle">
      <span class="label">MIC</span>
      <div id="leds"></div>
    </div>
    <button id="mic"><span class="ico">●</span><span id="micLabel">話す</span></button>
    <div id="hint">押して日本語で話すと、声に反応して雲がふくらみ、言葉が確定すると吹き出しに変わって浮かびます。</div>
  </div>

  <div id="fatal"><div class="box"><h2 id="fatalTitle"></h2><p id="fatalMsg"></p></div></div>

<script>
/* ============================================================
   声の吹き出し（3D） — 機能1 改訂版
   ・LEDレベルメーター（マイクが生きているか確認）
   ・話している間：たね（思考の雲）が声に合わせて揺れ・膨らむ
   ・言葉が確定：雲がその場で吹き出しに変わって浮かび上がる
   ============================================================ */

// ---------- Three.js ----------
const sceneEl = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setClearColor(0x000000, 0);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
sceneEl.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
camera.position.set(0, 0, 9);

let maxAniso = 1;
try { maxAniso = renderer.capabilities.getMaxAnisotropy(); } catch(e){}

function resize(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

function viewSizeAtZ(z){
  const dist = camera.position.z - z;
  const vH = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov/2)) * dist;
  return {vW: vH * camera.aspect, vH};
}

// ---------- 共通描画ヘルパ ----------
function roundRectPath(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}
function wrapJP(ctx, text, maxWidth){
  const lines = []; let line = '';
  for(const ch of Array.from(text)){
    if(ch === '\n'){ lines.push(line); line=''; continue; }
    const test = line + ch;
    if(ctx.measureText(test).width > maxWidth && line !== ''){ lines.push(line); line = ch; }
    else { line = test; }
  }
  if(line !== '') lines.push(line);
  return lines;
}
function texFromCanvas(canvas){
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = false;
  tex.anisotropy = maxAniso;
  return tex;
}

// ---------- 吹き出し（しっぽ付き）Canvas ----------
function makeBubbleCanvas(text){
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const fontSize = 52, pad = 46, maxTextWidth = 560, tailH = 52, tailW = 46, stroke = 7;
  const fontSpec = `700 ${fontSize}px "Zen Maru Gothic", sans-serif`;

  const m = document.createElement('canvas').getContext('2d');
  m.font = fontSpec;
  const lines = wrapJP(m, text, maxTextWidth);
  const lineH = fontSize * 1.35;
  let textW = 0;
  for(const l of lines) textW = Math.max(textW, m.measureText(l).width);

  const bw = Math.ceil(Math.max(textW, 40) + pad*2);
  const bh = Math.ceil(lines.length * lineH + pad*2);
  const cw = bw + stroke*2, ch = bh + tailH + stroke*2;

  const canvas = document.createElement('canvas');
  canvas.width = Math.ceil(cw*dpr); canvas.height = Math.ceil(ch*dpr);
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const bx = stroke, by = stroke;

  ctx.save();
  ctx.shadowColor='rgba(20,20,20,0.25)'; ctx.shadowOffsetX=6; ctx.shadowOffsetY=6;
  roundRectPath(ctx, bx, by, bw, bh, 34); ctx.fillStyle='#fff'; ctx.fill();
  ctx.restore();

  roundRectPath(ctx, bx, by, bw, bh, 34);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.lineWidth=stroke; ctx.strokeStyle='#141414'; ctx.lineJoin='round'; ctx.stroke();

  const cx = bx + bw*0.42, topY = by + bh - 2, tipX = cx-6, tipY = topY + tailH;
  ctx.beginPath();
  ctx.moveTo(cx - tailW/2, topY); ctx.lineTo(tipX, tipY); ctx.lineTo(cx + tailW/2, topY);
  ctx.closePath(); ctx.fillStyle='#fff'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx - tailW/2, topY); ctx.lineTo(tipX, tipY); ctx.lineTo(cx + tailW/2, topY);
  ctx.lineWidth=stroke; ctx.strokeStyle='#141414'; ctx.lineJoin='round'; ctx.stroke();

  ctx.fillStyle='#141414'; ctx.font=fontSpec; ctx.textAlign='center'; ctx.textBaseline='middle';
  const startY = by + pad + lineH/2;
  lines.forEach((l,i)=> ctx.fillText(l, bx + bw/2, startY + i*lineH));

  return {canvas, cw, ch};
}

// ---------- たね（思考の雲）Canvas ----------
function makeCloudCanvas(){
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const W = 340, H = 260, stroke = 8;
  const canvas = document.createElement('canvas');
  canvas.width = Math.ceil(W*dpr); canvas.height = Math.ceil(H*dpr);
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // モクモク雲 + 下に小さな思考の粒
  const puffs = [
    {x:105,y:112,r:40},{x:152,y:88,r:52},{x:205,y:98,r:48},
    {x:238,y:128,r:36},{x:192,y:140,r:50},{x:138,y:146,r:46},{x:100,y:142,r:32},
    {x:150,y:205,r:17},{x:132,y:232,r:10}
  ];
  const fill = (c, rAdd) => { ctx.beginPath(); ctx.arc(c.x, c.y, c.r+rAdd, 0, Math.PI*2); ctx.fill(); };

  ctx.save();
  ctx.shadowColor='rgba(20,20,20,0.22)'; ctx.shadowOffsetX=5; ctx.shadowOffsetY=6;
  ctx.fillStyle='#141414'; puffs.forEach(c=>fill(c, stroke)); // 輪郭（黒の下地）
  ctx.restore();
  ctx.fillStyle='#141414'; puffs.forEach(c=>fill(c, stroke));
  ctx.fillStyle='#ffffff'; puffs.forEach(c=>fill(c, 0));      // 白い本体

  return {canvas, cw:W, ch:H};
}

// ---------- 吹き出しを3D空間に出す ----------
const bubbles = [];
const MAX_BUBBLES = 14;

function spawnBubble(text, origin){
  if(!text) return;
  const {canvas, cw, ch} = makeBubbleCanvas(text);
  const mat = new THREE.MeshBasicMaterial({map:texFromCanvas(canvas), transparent:true, opacity:0, depthWrite:false});
  const aspect = cw/ch;
  const worldH = Math.min(3.4, Math.max(2.2, 2.4 + ch/900));
  const worldW = worldH * aspect;
  const geo = new THREE.PlaneGeometry(worldW, worldH);
  const mesh = new THREE.Mesh(geo, mat);

  // 雲の位置から生まれる（origin指定）。無ければランダム。
  let x, y, z;
  if(origin){
    x = origin.x + (Math.random()-0.5)*1.2;
    y = origin.y + (Math.random()-0.5)*0.4;
    z = origin.z + (Math.random()-0.5)*1.2;
  } else {
    z = -1 - Math.random()*4;
    const {vW, vH} = viewSizeAtZ(z);
    x = (Math.random()-0.5) * Math.max(0.5, vW - worldW);
    y = (Math.random()-0.5) * Math.max(0.5, vH - worldH);
  }
  mesh.position.set(x, y, z);
  mesh.renderOrder = 100 - z;
  scene.add(mesh);

  bubbles.push({
    mesh, born: performance.now(),
    life: 9000, fadeIn: 300, fadeOut: 1400, emerge: 380,
    baseX:x, baseY:y,
    phase: Math.random()*Math.PI*2,
    bob: 0.18 + Math.random()*0.16,
    sway: 0.10 + Math.random()*0.10,
    rise: 0.14 + Math.random()*0.12,
    spin: (Math.random()-0.5)*0.06
  });

  if(bubbles.length > MAX_BUBBLES) disposeBubble(bubbles.shift());
}
function disposeBubble(b){
  scene.remove(b.mesh);
  b.mesh.geometry.dispose();
  if(b.mesh.material.map) b.mesh.material.map.dispose();
  b.mesh.material.dispose();
}

// ---------- たね（雲）オブジェクト ----------
const SEED_POS = {x:0, y:-1.0, z:0};
let seed = null;      // {mesh, scaleCur}
function createSeed(){
  if(seed) return;
  const {canvas, cw, ch} = makeCloudCanvas();
  const mat = new THREE.MeshBasicMaterial({map:texFromCanvas(canvas), transparent:true, opacity:0, depthWrite:false});
  const worldH = 1.5, worldW = worldH * (cw/ch);
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(worldW, worldH), mat);
  mesh.position.set(SEED_POS.x, SEED_POS.y, SEED_POS.z);
  mesh.renderOrder = 200;
  scene.add(mesh);
  seed = {mesh, scaleCur:1};
}
function removeSeed(){
  if(!seed) return;
  scene.remove(seed.mesh);
  seed.mesh.geometry.dispose();
  if(seed.mesh.material.map) seed.mesh.material.map.dispose();
  seed.mesh.material.dispose();
  seed = null;
}

// ---------- アニメーション ----------
const easeOut = k => 1 - (1-k)*(1-k);
function animate(){
  requestAnimationFrame(animate);
  const now = performance.now(), t = now/1000;

  // レベル取得
  const level01 = readLevel();  // 0..1
  updateLED(level01);

  // たね：声に反応（膨らむ・揺れる）
  if(seed){
    const target = 0.9 + level01*1.4 + (interimActive ? 0.15 : 0);
    seed.scaleCur += (target - seed.scaleCur) * 0.25;
    const wob = 1 + Math.sin(t*7)*0.03*(0.3+level01);
    seed.mesh.scale.set(seed.scaleCur*wob, seed.scaleCur*(2-wob), 1);
    seed.mesh.position.x = SEED_POS.x + Math.sin(t*3.1)*0.05*(0.3+level01);
    seed.mesh.position.y = SEED_POS.y + Math.sin(t*1.6)*0.06 + level01*0.15;
    seed.mesh.rotation.z = Math.sin(t*2.2)*0.03;
    seed.mesh.material.opacity += ((listening?1:0) - seed.mesh.material.opacity)*0.15;
  }

  // 吹き出し
  for(let i=bubbles.length-1; i>=0; i--){
    const b = bubbles[i], age = now-b.born, ageS = age/1000;
    b.mesh.position.x = b.baseX + Math.sin(t*0.7 + b.phase)*b.sway;
    b.mesh.position.y = b.baseY + Math.sin(t*1.1 + b.phase)*b.bob + ageS*b.rise;
    b.mesh.rotation.z = Math.sin(t*0.9 + b.phase)*0.05 + b.spin*Math.sin(t*0.4);

    let s = 1;
    if(age < b.emerge){ const k = age/b.emerge; s = 0.35 + 0.65*easeOut(k) + Math.sin(k*Math.PI)*0.08; }
    b.mesh.scale.setScalar(s);

    let op = 1;
    if(age < b.fadeIn) op = age/b.fadeIn;
    else if(age > b.life - b.fadeOut) op = Math.max(0,(b.life-age)/b.fadeOut);
    b.mesh.material.opacity = op;

    if(age > b.life){ disposeBubble(b); bubbles.splice(i,1); }
  }
  renderer.render(scene, camera);
}
animate();

// ---------- マイクのレベル解析（getUserMedia + Analyser） ----------
let audioCtx=null, analyser=null, micStream=null, timeData=null, levelSmooth=0;
async function startMeter(){
  try{
    micStream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true, noiseSuppression:true}});
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') await audioCtx.resume();
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.5;
    src.connect(analyser);
    timeData = new Uint8Array(analyser.fftSize);
    document.getElementById('meter').classList.remove('idle');
  }catch(err){
    // メーターが使えなくても音声認識は動くので、ここでは致命扱いにしない
    analyser = null;
  }
}
function stopMeter(){
  try{ if(micStream) micStream.getTracks().forEach(tr=>tr.stop()); }catch(e){}
  try{ if(audioCtx) audioCtx.close(); }catch(e){}
  micStream=null; audioCtx=null; analyser=null; levelSmooth=0;
  document.getElementById('meter').classList.add('idle');
  updateLED(0);
}
function readLevel(){
  if(!analyser) return 0;
  analyser.getByteTimeDomainData(timeData);
  let sum=0;
  for(let i=0;i<timeData.length;i++){ const v=(timeData[i]-128)/128; sum+=v*v; }
  const rms = Math.sqrt(sum/timeData.length);
  const lv = Math.min(1, rms*5.0);           // ゲイン
  levelSmooth += (lv - levelSmooth) * 0.35;  // なめらかに
  return levelSmooth;
}

// ---------- LEDメーター ----------
const LED_SEGS = 6;
const ledWrap = document.getElementById('leds');
const ledEls = [];
for(let i=0;i<LED_SEGS;i++){
  const d = document.createElement('div');
  d.className = 'led';
  if(i === LED_SEGS-2) d.dataset.tone = 'amber';
  if(i === LED_SEGS-1) d.dataset.tone = 'red';
  ledWrap.appendChild(d); ledEls.push(d);
}
let lastOn = -1;
function updateLED(level01){
  const on = Math.min(LED_SEGS, Math.round(level01*LED_SEGS));
  if(on === lastOn) return;
  lastOn = on;
  for(let i=0;i<LED_SEGS;i++){
    const el = ledEls[i];
    const active = i < on;
    el.classList.toggle('on', active);
    el.classList.toggle('amber', active && el.dataset.tone==='amber');
    el.classList.toggle('red',   active && el.dataset.tone==='red');
  }
}

// ---------- 音声認識 ----------
const statusBar = document.getElementById('status');
const statusText = document.getElementById('statusText');
const micBtn = document.getElementById('mic');
const micLabel = document.getElementById('micLabel');
function setStatus(msg, live){ statusText.textContent = msg; statusBar.classList.toggle('live', !!live); }
function showFatal(title, msg){
  document.getElementById('fatalTitle').textContent = title;
  document.getElementById('fatalMsg').textContent = msg;
  document.getElementById('fatal').style.display = 'flex';
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, listening = false, interimActive = false;

if(!SR){
  showFatal('音声認識に非対応です',
    'このブラウザは Web Speech API に対応していません。PCは Chrome / Edge、スマホは Android Chrome か iOS Safari でお試しください。');
} else {
  rec = new SR();
  rec.lang = 'ja-JP'; rec.continuous = true; rec.interimResults = true;

  rec.onresult = (e) => {
    let interim = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const r = e.results[i];
      if(r.isFinal){
        const txt = (r[0].transcript || '').trim();
        if(txt){
          // 雲の位置から吹き出しが生まれる
          const origin = seed ? {x:seed.mesh.position.x, y:seed.mesh.position.y, z:seed.mesh.position.z} : SEED_POS;
          spawnBubble(txt, origin);
        }
      } else {
        interim += r[0].transcript;
      }
    }
    interimActive = interim.length > 0;
    setStatus(interim ? '聞いています… ' + interim : '聞いています…', true);
  };
  rec.onerror = (e) => {
    if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
      stopListening();
      showFatal('マイクが使えません',
        'マイクの使用が許可されていません。ブラウザやOSの設定でマイクを許可してから、もう一度お試しください。');
    } else if(e.error === 'network'){
      setStatus('ネットワークエラー(音声認識はネット接続が必要です)', false);
    }
  };
  rec.onend = () => { if(listening){ try{ rec.start(); }catch(_){} } };
}

function startListening(){
  if(!rec) return;
  listening = true; interimActive = false;
  micBtn.classList.add('on'); micLabel.textContent = '停止';
  setStatus('聞いています…', true);
  createSeed();
  startMeter();
  try { rec.start(); } catch(_){}
}
function stopListening(){
  listening = false; interimActive = false;
  micBtn.classList.remove('on'); micLabel.textContent = '話す';
  setStatus('停止中。マイクを押すと再開します', false);
  removeSeed();
  stopMeter();
  try { rec.stop(); } catch(_){}
}
micBtn.addEventListener('click', () => {
  if(!rec) return;
  if(listening) stopListening(); else startListening();
});
</script>
</body>
</html>
