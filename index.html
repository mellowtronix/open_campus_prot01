<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>声の吹き出し</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#f6f3ec; --ink:#141414; --accent:#e5533d; --muted:#8a8578; --led-off:#cfc9ba; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:"Zen Maru Gothic",system-ui,sans-serif;color:var(--ink);
    background-color:var(--paper);
    background-image:radial-gradient(rgba(20,20,20,0.05) 1px, transparent 1.4px);
    background-size:14px 14px;position:fixed;inset:0;
  }
  #stage{position:fixed;inset:0;z-index:1;display:block;}
  .vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
    box-shadow:inset 0 0 220px rgba(20,20,20,0.10);}

  #status{position:fixed;top:0;left:0;right:0;z-index:5;
    display:flex;justify-content:center;pointer-events:none;padding:16px 14px;}
  #status .pill{max-width:90vw;background:rgba(255,255,255,0.85);
    border:2px solid var(--ink);border-radius:999px;padding:8px 18px;
    font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px;
    box-shadow:3px 3px 0 rgba(20,20,20,0.9);backdrop-filter:blur(2px);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #status .dot{width:10px;height:10px;border-radius:50%;background:var(--muted);flex:none;}
  #status.live .dot{background:var(--accent);animation:pulse 1s infinite;}
  @keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}100%{transform:scale(1);opacity:1}}

  #controls{position:fixed;left:0;right:0;bottom:0;z-index:6;
    display:flex;flex-direction:column;align-items:center;gap:12px;
    padding:18px 16px calc(22px + env(safe-area-inset-bottom));}
  #meter{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.85);
    border:2px solid var(--ink);border-radius:12px;padding:8px 14px;
    box-shadow:3px 3px 0 rgba(20,20,20,0.9);backdrop-filter:blur(2px);}
  #meter .label{font-size:11px;font-weight:900;letter-spacing:.12em;color:var(--muted);}
  #meter.idle .label{opacity:.5;}
  #leds{display:flex;gap:5px;align-items:center;}
  #leds .led{width:12px;height:20px;border-radius:3px;border:1.5px solid rgba(20,20,20,0.55);
    background:var(--led-off);transition:background .06s linear, box-shadow .06s linear;}
  #leds .led.on{background:#39c46b;box-shadow:0 0 7px rgba(57,196,107,0.85);}
  #leds .led.on.amber{background:#f2b134;box-shadow:0 0 7px rgba(242,177,52,0.9);}
  #leds .led.on.red{background:#e5533d;box-shadow:0 0 8px rgba(229,83,61,0.95);}

  #mic{appearance:none;border:3px solid var(--ink);cursor:pointer;background:var(--accent);
    color:#fff;font-family:inherit;font-weight:900;font-size:18px;letter-spacing:.04em;
    padding:15px 30px;border-radius:16px;box-shadow:5px 5px 0 rgba(20,20,20,0.9);
    transition:transform .06s ease, box-shadow .06s ease;display:flex;align-items:center;gap:12px;}
  #mic:active{transform:translate(3px,3px);box-shadow:2px 2px 0 rgba(20,20,20,0.9);}
  #mic.on{background:#fff;color:var(--ink);}
  #mic .ico{font-size:20px;}
  #hint{font-size:12px;color:var(--muted);font-weight:500;text-align:center;max-width:88vw;}

  #fatal{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
    padding:28px;background:rgba(246,243,236,0.96);text-align:center;}
  #fatal .box{max-width:440px;border:3px solid var(--ink);background:#fff;padding:26px 24px;
    border-radius:18px;box-shadow:6px 6px 0 rgba(20,20,20,0.9);}
  #fatal h2{font-size:20px;margin-bottom:10px;}
  #fatal p{font-size:14px;line-height:1.7;color:#333;}
</style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="vignette"></div>

  <div id="status"><div class="pill"><span class="dot"></span><span id="statusText">マイクを押して話しかけてください</span></div></div>

  <div id="controls">
    <div id="meter" class="idle"><span class="label">MIC</span><div id="leds"></div></div>
    <button id="mic"><span class="ico">&#9679;</span><span id="micLabel">話す</span></button>
    <div id="hint">押して日本語で話すと、声に反応して雲がふくらみ、言葉が確定すると吹き出しに変わって浮かびます。</div>
  </div>

  <div id="fatal"><div class="box"><h2 id="fatalTitle"></h2><p id="fatalMsg"></p></div></div>

<script>
/* ============================================================
   声の吹き出し — WebGL非依存版（2Dキャンバスで疑似3D）
   ・LEDレベルメーター（マイク死活確認）
   ・話している間：雲（たね）が声に反応して膨らむ・揺れる
   ・言葉が確定：雲の位置から吹き出しが生まれて浮かび上がる
   3D描画エンジンを使わないので、WebGLが無い/弱い端末でも動作する
   ============================================================ */

// ---------- キャンバス ----------
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// 雲（たね）が居る位置＝画面下中央、コントロールの少し上
function seedXY(){ return { x: W * 0.5, y: H - 210 }; }

// ---------- 描画ヘルパ ----------
function roundRectPath(c, x, y, w, h, r){
  c.beginPath();
  c.moveTo(x+r, y);
  c.arcTo(x+w, y,   x+w, y+h, r);
  c.arcTo(x+w, y+h, x,   y+h, r);
  c.arcTo(x,   y+h, x,   y,   r);
  c.arcTo(x,   y,   x+w, y,   r);
  c.closePath();
}
function wrapJP(c, text, maxWidth){
  const lines = []; let line = '';
  for(const ch of Array.from(text)){
    if(ch === '\n'){ lines.push(line); line=''; continue; }
    const test = line + ch;
    if(c.measureText(test).width > maxWidth && line !== ''){ lines.push(line); line = ch; }
    else { line = test; }
  }
  if(line !== '') lines.push(line);
  return lines;
}

// ---------- 吹き出し（しっぽ付き）を1枚のキャンバスに描く ----------
function makeBubbleCanvas(text){
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const fontSize = 52, pad = 46, maxTextWidth = 560, tailH = 52, tailW = 46, stroke = 7;
  const fontSpec = '700 ' + fontSize + 'px "Zen Maru Gothic", sans-serif';

  const m = document.createElement('canvas').getContext('2d');
  m.font = fontSpec;
  const lines = wrapJP(m, text, maxTextWidth);
  const lineH = fontSize * 1.35;
  let textW = 0;
  for(const l of lines) textW = Math.max(textW, m.measureText(l).width);

  const bw = Math.ceil(Math.max(textW, 40) + pad*2);
  const bh = Math.ceil(lines.length * lineH + pad*2);
  const cw = bw + stroke*2, ch = bh + tailH + stroke*2;

  const cv = document.createElement('canvas');
  cv.width = Math.ceil(cw*dpr); cv.height = Math.ceil(ch*dpr);
  const c = cv.getContext('2d');
  c.scale(dpr, dpr);
  const bx = stroke, by = stroke;

  c.save();
  c.shadowColor='rgba(20,20,20,0.25)'; c.shadowOffsetX=6; c.shadowOffsetY=6;
  roundRectPath(c, bx, by, bw, bh, 34); c.fillStyle='#fff'; c.fill();
  c.restore();

  roundRectPath(c, bx, by, bw, bh, 34);
  c.fillStyle='#fff'; c.fill();
  c.lineWidth=stroke; c.strokeStyle='#141414'; c.lineJoin='round'; c.stroke();

  const cx = bx + bw*0.42, topY = by + bh - 2, tipX = cx-6, tipY = topY + tailH;
  c.beginPath(); c.moveTo(cx - tailW/2, topY); c.lineTo(tipX, tipY); c.lineTo(cx + tailW/2, topY);
  c.closePath(); c.fillStyle='#fff'; c.fill();
  c.beginPath(); c.moveTo(cx - tailW/2, topY); c.lineTo(tipX, tipY); c.lineTo(cx + tailW/2, topY);
  c.lineWidth=stroke; c.strokeStyle='#141414'; c.lineJoin='round'; c.stroke();

  c.fillStyle='#141414'; c.font=fontSpec; c.textAlign='center'; c.textBaseline='middle';
  const startY = by + pad + lineH/2;
  lines.forEach((l,i)=> c.fillText(l, bx + bw/2, startY + i*lineH));

  return {canvas:cv, cw, ch};
}

// ---------- たね（思考の雲）を1枚のキャンバスに描く ----------
let cloudCache = null;
function makeCloudCanvas(){
  if(cloudCache) return cloudCache;
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const Wd = 340, Hd = 260, stroke = 8;
  const cv = document.createElement('canvas');
  cv.width = Math.ceil(Wd*dpr); cv.height = Math.ceil(Hd*dpr);
  const c = cv.getContext('2d');
  c.scale(dpr, dpr);
  const puffs = [
    {x:105,y:112,r:40},{x:152,y:88,r:52},{x:205,y:98,r:48},
    {x:238,y:128,r:36},{x:192,y:140,r:50},{x:138,y:146,r:46},{x:100,y:142,r:32},
    {x:150,y:205,r:17},{x:132,y:232,r:10}
  ];
  const fill = (o, rAdd) => { c.beginPath(); c.arc(o.x, o.y, o.r+rAdd, 0, Math.PI*2); c.fill(); };
  c.save();
  c.shadowColor='rgba(20,20,20,0.22)'; c.shadowOffsetX=5; c.shadowOffsetY=6;
  c.fillStyle='#141414'; puffs.forEach(o=>fill(o, stroke));
  c.restore();
  c.fillStyle='#141414'; puffs.forEach(o=>fill(o, stroke));
  c.fillStyle='#ffffff'; puffs.forEach(o=>fill(o, 0));
  cloudCache = {canvas:cv, cw:Wd, ch:Hd};
  return cloudCache;
}

// ---------- 吹き出しオブジェクト ----------
const bubbles = [];
const MAX_BUBBLES = 14;
const FONT_TARGET = 30;       // 画面上の文字サイズ目安(px)
const CANVAS_FONT = 52;       // 元キャンバスの文字サイズ

function spawnBubble(text){
  if(!text) return;
  const {canvas:img, cw, ch} = makeBubbleCanvas(text);
  const s = seedXY();
  const depth = 0.62 + Math.random()*0.38;             // 奥行き(小さい=奥)
  const baseScale = (FONT_TARGET / CANVAS_FONT) * depth; // 文字サイズを揃えつつ奥行きで縮小
  bubbles.push({
    img, cw, ch, depth, baseScale,
    born: performance.now(), life: 9000, fadeIn: 300, fadeOut: 1400, emerge: 380,
    baseX: s.x + (Math.random()-0.5)*80,
    baseY: s.y + (Math.random()-0.5)*20,
    phase: Math.random()*Math.PI*2,
    bob: 10 + Math.random()*10,
    sway: 14 + Math.random()*14,
    rise: (26 + Math.random()*22) * depth,   // 奥ほどゆっくり上昇(視差)
    spin: (Math.random()-0.5)*0.10
  });
  if(bubbles.length > MAX_BUBBLES) bubbles.shift();
}

// ---------- 音声レベル(getUserMedia + Analyser) ----------
let audioCtx=null, analyser=null, micStream=null, timeData=null, levelSmooth=0;
async function startMeter(){
  try{
    micStream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true, noiseSuppression:true}});
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') await audioCtx.resume();
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512; analyser.smoothingTimeConstant = 0.5;
    src.connect(analyser);
    timeData = new Uint8Array(analyser.fftSize);
    document.getElementById('meter').classList.remove('idle');
  }catch(err){ analyser = null; }
}
function stopMeter(){
  try{ if(micStream) micStream.getTracks().forEach(t=>t.stop()); }catch(e){}
  try{ if(audioCtx) audioCtx.close(); }catch(e){}
  micStream=null; audioCtx=null; analyser=null; levelSmooth=0;
  document.getElementById('meter').classList.add('idle');
  updateLED(0);
}
function readLevel(){
  if(!analyser) return 0;
  analyser.getByteTimeDomainData(timeData);
  let sum=0;
  for(let i=0;i<timeData.length;i++){ const v=(timeData[i]-128)/128; sum+=v*v; }
  const rms = Math.sqrt(sum/timeData.length);
  const lv = Math.min(1, rms*5.0);
  levelSmooth += (lv - levelSmooth) * 0.35;
  return levelSmooth;
}

// ---------- LEDメーター ----------
const LED_SEGS = 6;
const ledWrap = document.getElementById('leds');
const ledEls = [];
for(let i=0;i<LED_SEGS;i++){
  const d = document.createElement('div'); d.className='led';
  if(i===LED_SEGS-2) d.dataset.tone='amber';
  if(i===LED_SEGS-1) d.dataset.tone='red';
  ledWrap.appendChild(d); ledEls.push(d);
}
let lastOn = -1;
function updateLED(level01){
  const on = Math.min(LED_SEGS, Math.round(level01*LED_SEGS));
  if(on === lastOn) return;
  lastOn = on;
  for(let i=0;i<LED_SEGS;i++){
    const el = ledEls[i], active = i < on;
    el.classList.toggle('on', active);
    el.classList.toggle('amber', active && el.dataset.tone==='amber');
    el.classList.toggle('red',   active && el.dataset.tone==='red');
  }
}

// ---------- 描画ループ ----------
const easeOut = k => 1 - (1-k)*(1-k);
let seedScale = 1;
function draw(){
  requestAnimationFrame(draw);
  const now = performance.now(), t = now/1000;
  ctx.clearRect(0, 0, W, H);

  const level01 = readLevel();
  updateLED(level01);

  // 奥のものから描く(疑似3Dの重なり)
  bubbles.sort((a,b)=> a.depth - b.depth);

  for(let i=0;i<bubbles.length;i++){
    const b = bubbles[i], age = now-b.born, ageS = age/1000;
    if(age > b.life){ bubbles.splice(i,1); i--; continue; }

    const x = b.baseX + Math.sin(t*0.7 + b.phase)*b.sway;
    const y = b.baseY + Math.sin(t*1.1 + b.phase)*b.bob - ageS*b.rise; // 上へ
    const rot = Math.sin(t*0.9 + b.phase)*0.05 + b.spin*Math.sin(t*0.4);

    let grow = 1;
    if(age < b.emerge){ const k = age/b.emerge; grow = 0.35 + 0.65*easeOut(k) + Math.sin(k*Math.PI)*0.08; }
    let op = 1;
    if(age < b.fadeIn) op = age/b.fadeIn;
    else if(age > b.life - b.fadeOut) op = Math.max(0,(b.life-age)/b.fadeOut);

    const sc = b.baseScale * grow;
    const dw = b.cw * sc, dh = b.ch * sc;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.globalAlpha = op;
    ctx.drawImage(b.img, -dw/2, -dh/2, dw, dh);
    ctx.restore();
  }

  // たね(雲) ： 声に反応
  if(listening){
    const cloud = makeCloudCanvas();
    const s = seedXY();
    const target = 0.85 + level01*1.3 + (interimActive ? 0.12 : 0);
    seedScale += (target - seedScale) * 0.25;
    const sx = seedScale * (1 + Math.sin(t*7)*0.03*(0.3+level01));
    const sy = seedScale * (1 - Math.sin(t*7)*0.03*(0.3+level01));
    const base = 0.62;
    const dw = cloud.cw * base * sx, dh = cloud.ch * base * sy;
    const px = s.x + Math.sin(t*3.1)*8*(0.3+level01);
    const py = s.y + Math.sin(t*1.6)*7 - level01*22;
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(Math.sin(t*2.2)*0.03);
    ctx.globalAlpha = seedAlpha;
    ctx.drawImage(cloud.canvas, -dw/2, -dh/2, dw, dh);
    ctx.restore();
  }
}
draw();

// ---------- 音声認識 ----------
const statusBar = document.getElementById('status');
const statusText = document.getElementById('statusText');
const micBtn = document.getElementById('mic');
const micLabel = document.getElementById('micLabel');
function setStatus(msg, live){ statusText.textContent = msg; statusBar.classList.toggle('live', !!live); }
function showFatal(title, msg){
  document.getElementById('fatalTitle').textContent = title;
  document.getElementById('fatalMsg').textContent = msg;
  document.getElementById('fatal').style.display = 'flex';
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, listening = false, interimActive = false, seedAlpha = 0;

if(!SR){
  showFatal('音声認識に非対応です',
    'このブラウザは Web Speech API に対応していません。PCは Chrome / Edge、スマホは Android Chrome か iOS Safari でお試しください。');
} else {
  rec = new SR();
  rec.lang = 'ja-JP'; rec.continuous = true; rec.interimResults = true;
  rec.onresult = (e) => {
    let interim = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const r = e.results[i];
      if(r.isFinal){ const txt = (r[0].transcript || '').trim(); if(txt) spawnBubble(txt); }
      else interim += r[0].transcript;
    }
    interimActive = interim.length > 0;
    setStatus(interim ? '聞いています… ' + interim : '聞いています…', true);
  };
  rec.onerror = (e) => {
    if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
      stopListening();
      showFatal('マイクが使えません',
        'マイクの使用が許可されていません。ブラウザやOSの設定でマイクを許可してから、もう一度お試しください。');
    } else if(e.error === 'network'){
      setStatus('ネットワークエラー(音声認識はネット接続が必要です)', false);
    }
  };
  rec.onend = () => { if(listening){ try{ rec.start(); }catch(_){} } };
}

// たねのフェードを毎フレーム更新
(function seedFade(){
  requestAnimationFrame(seedFade);
  const goal = listening ? 1 : 0;
  seedAlpha += (goal - seedAlpha) * 0.15;
})();

function startListening(){
  if(!rec) return;
  listening = true; interimActive = false; seedScale = 1;
  micBtn.classList.add('on'); micLabel.textContent = '停止';
  setStatus('聞いています…', true);
  startMeter();
  try { rec.start(); } catch(_){}
}
function stopListening(){
  listening = false; interimActive = false;
  micBtn.classList.remove('on'); micLabel.textContent = '話す';
  setStatus('停止中。マイクを押すと再開します', false);
  stopMeter();
  try { rec.stop(); } catch(_){}
}
micBtn.addEventListener('click', () => {
  if(!rec) return;
  if(listening) stopListening(); else startListening();
});
</script>
</body>
</html>
